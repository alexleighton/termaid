name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / ocaml ${{ matrix.ocaml-compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pure OCaml + Unicode data (uutf/uucp) — portable across platforms.
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler:
          - "4.14" # declared lower bound
          - "5"    # latest release — forward-compat

    steps:
      - uses: actions/checkout@v5

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Lint opam metadata
        run: opam lint termaid.opam

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Tests
        run: opam exec -- dune runtest
